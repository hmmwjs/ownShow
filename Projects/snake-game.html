<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唯美贪吃蛇 | 我的空间</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1/1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        
        .game-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .btn-start {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #3498db, #6a11cb);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
        }
        
        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(106, 17, 203, 0.6);
        }
        
        .game-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            z-index: 5;
        }
        
        .game-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            z-index: 5;
            display: flex;
            gap: 10px;
        }
        
        .control-key {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-size: 1.2rem;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            transition: transform 0.3s ease;
            z-index: 5;
        }
        
        .back-link:hover {
            transform: translateY(-3px);
        }
        
        .game-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #3498db, #6a11cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        
        .game-subtitle {
            color: #666;
            max-width: 80%;
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* 移动端控制器 */
        @media (max-width: 768px) {
            .mobile-controls {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(3, 1fr);
                gap: 10px;
                z-index: 15;
            }
            
            .mobile-btn {
                width: 60px;
                height: 60px;
                background-color: rgba(255, 255, 255, 0.8);
                border-radius: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                font-size: 1.5rem;
                color: #3498db;
            }
            
            .up-btn {
                grid-column: 2;
                grid-row: 1;
            }
            
            .left-btn {
                grid-column: 1;
                grid-row: 2;
            }
            
            .right-btn {
                grid-column: 3;
                grid-row: 2;
            }
            
            .down-btn {
                grid-column: 2;
                grid-row: 3;
            }
        }
    </style>
</head>
<body>
    <a href="../pages/projects.html" class="back-link">
        <i class="fas fa-arrow-left"></i> 返回作品集
    </a>
    
    <div class="game-container">
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="game-info">
                分数: <span id="score">0</span>
            </div>
            
            <div class="game-controls">
                <div class="control-key">↑</div>
                <div class="control-key">←</div>
                <div class="control-key">↓</div>
                <div class="control-key">→</div>
            </div>
            
            <div class="game-overlay" id="gameOverlay">
                <h1 class="game-title">唯美贪吃蛇</h1>
                <p class="game-subtitle">在这个美丽的花园中，你是一条追寻花朵的小蛇。收集花朵，变得更长，但要小心别撞到自己！</p>
                <button class="btn-start" id="startBtn">开始游戏</button>
            </div>
        </div>
    </div>
    
    <!-- 移动设备控制器，默认隐藏 -->
    <div class="mobile-controls" style="display: none;">
        <div class="mobile-btn up-btn" id="upBtn">
            <i class="fas fa-chevron-up"></i>
        </div>
        <div class="mobile-btn left-btn" id="leftBtn">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="mobile-btn right-btn" id="rightBtn">
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="mobile-btn down-btn" id="downBtn">
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const startBtn = document.getElementById('startBtn');
            const gameOverlay = document.getElementById('gameOverlay');
            const scoreElement = document.getElementById('score');
            
            // 移动设备检测
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const mobileControls = document.querySelector('.mobile-controls');
            
            if (isMobile) {
                mobileControls.style.display = 'grid';
            }
            
            // 设置画布尺寸
            function resizeCanvas() {
                const wrapper = canvas.parentElement;
                const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
                canvas.width = size;
                canvas.height = size;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // 游戏配置
            const gridSize = 20;
            let snake = [];
            let food = {};
            let direction = 'right';
            let nextDirection = 'right';
            let score = 0;
            let gameSpeed = 150; // 初始速度
            let gameInterval;
            let isGameOver = true;
            
            // 图像资源
            const images = {
                // 使用emoji图标作为游戏元素
                snakeHead: '🦋', // 蝴蝶头部
                snakeBody: '🌿', // 藤蔓身体
                food: ['🌸', '🌹', '🌺', '🌻', '🌼'] // 各种花朵作为食物
            };
            
            // 随机生成食物位置
            function createFood() {
                const gridCount = Math.floor(canvas.width / gridSize);
                const foodType = images.food[Math.floor(Math.random() * images.food.length)];
                
                // 确保食物不会生成在蛇身上
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * gridCount) * gridSize,
                        y: Math.floor(Math.random() * gridCount) * gridSize,
                        type: foodType
                    };
                } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
                
                return newFood;
            }
            
            // 初始化游戏
            function initGame() {
                const gridCount = Math.floor(canvas.width / gridSize);
                const centerGrid = Math.floor(gridCount / 2) * gridSize;
                
                // 初始蛇位置在中央
                snake = [
                    {x: centerGrid, y: centerGrid},
                    {x: centerGrid - gridSize, y: centerGrid},
                    {x: centerGrid - gridSize * 2, y: centerGrid}
                ];
                
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                scoreElement.textContent = score;
                gameSpeed = 150;
                food = createFood();
                isGameOver = false;
            }
            
            // 绘制游戏元素
            function drawGame() {
                // 清除画布
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制网格背景
                ctx.strokeStyle = 'rgba(200, 220, 240, 0.5)';
                ctx.lineWidth = 1;
                
                for (let x = 0; x <= canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                
                for (let y = 0; y <= canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                
                // 绘制食物
                ctx.font = `${gridSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(food.type, food.x + gridSize/2, food.y + gridSize/2);
                
                // 绘制蛇
                snake.forEach((segment, index) => {
                    const icon = index === 0 ? images.snakeHead : images.snakeBody;
                    ctx.fillText(icon, segment.x + gridSize/2, segment.y + gridSize/2);
                    
                    // 如果是头部，添加轻微的发光效果
                    if (index === 0) {
                        ctx.shadowColor = 'rgba(52, 152, 219, 0.6)';
                        ctx.shadowBlur = 15;
                        ctx.fillText(icon, segment.x + gridSize/2, segment.y + gridSize/2);
                        ctx.shadowBlur = 0;
                    }
                });
            }
            
            // 移动蛇
            function moveSnake() {
                // 更新方向
                direction = nextDirection;
                
                // 根据方向计算下一个头部位置
                const head = {x: snake[0].x, y: snake[0].y};
                
                switch(direction) {
                    case 'up':
                        head.y -= gridSize;
                        break;
                    case 'down':
                        head.y += gridSize;
                        break;
                    case 'left':
                        head.x -= gridSize;
                        break;
                    case 'right':
                        head.x += gridSize;
                        break;
                }
                
                // 碰撞检测：边界
                if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                    gameOver();
                    return;
                }
                
                // 碰撞检测：自身
                for (let i = 0; i < snake.length; i++) {
                    if (head.x === snake[i].x && head.y === snake[i].y) {
                        gameOver();
                        return;
                    }
                }
                
                // 添加新头部
                snake.unshift(head);
                
                // 检查是否吃到食物
                if (head.x === food.x && head.y === food.y) {
                    // 吃到食物，加分并生成新食物
                    score += 10;
                    scoreElement.textContent = score;
                    food = createFood();
                    
                    // 每吃5个食物，速度增加
                    if (score % 50 === 0 && gameSpeed > 50) {
                        gameSpeed -= 10;
                        clearInterval(gameInterval);
                        gameInterval = setInterval(gameLoop, gameSpeed);
                    }
                } else {
                    // 没吃到食物，移除尾部
                    snake.pop();
                }
            }
            
            // 游戏结束
            function gameOver() {
                clearInterval(gameInterval);
                isGameOver = true;
                gameOverlay.classList.remove('hidden');
                startBtn.textContent = '重新开始';
            }
            
            // 游戏主循环
            function gameLoop() {
                moveSnake();
                drawGame();
            }
            
            // 开始游戏
            startBtn.addEventListener('click', function() {
                gameOverlay.classList.add('hidden');
                initGame();
                clearInterval(gameInterval);
                gameInterval = setInterval(gameLoop, gameSpeed);
            });
            
            // 键盘控制
            document.addEventListener('keydown', function(event) {
                switch(event.key) {
                    case 'ArrowUp':
                        if (direction !== 'down') nextDirection = 'up';
                        break;
                    case 'ArrowDown':
                        if (direction !== 'up') nextDirection = 'down';
                        break;
                    case 'ArrowLeft':
                        if (direction !== 'right') nextDirection = 'left';
                        break;
                    case 'ArrowRight':
                        if (direction !== 'left') nextDirection = 'right';
                        break;
                }
            });
            
            // 移动设备控制
            if (isMobile) {
                document.getElementById('upBtn').addEventListener('touchstart', function() {
                    if (direction !== 'down') nextDirection = 'up';
                });
                
                document.getElementById('downBtn').addEventListener('touchstart', function() {
                    if (direction !== 'up') nextDirection = 'down';
                });
                
                document.getElementById('leftBtn').addEventListener('touchstart', function() {
                    if (direction !== 'right') nextDirection = 'left';
                });
                
                document.getElementById('rightBtn').addEventListener('touchstart', function() {
                    if (direction !== 'left') nextDirection = 'right';
                });
            }
            
            // 初始绘制
            drawGame();
        });
    </script>
</body>
</html>
